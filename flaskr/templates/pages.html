{% extends "main.html" %}

{% block page_name %}
Wiki Pages
{% endblock %}

{% block content %}
<h3>Pages contained in this Wiki</h3>

<ul class="pages-nav">
    {% for page in all_pages %}
    <li>
        <a href="{{ url_for('pages', name=page) }}"
           class="{% if page == current_page %}active-page{% endif %}">
            {{ page }}
        </a>
    </li>
    {% endfor %}
</ul>

{% endblock %}
